<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0e17"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="gold-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="20%" stop-color="rgba(212,175,55,0.4)"/>
      <stop offset="80%" stop-color="rgba(212,175,55,0.4)"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#gold-line)" y="310" height="1" opacity="0.15"/>

  <!-- 八卦装饰 -->
  <g opacity="0.04" fill="none" stroke="#d4af37" stroke-width="1">
    <line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1140" y1="0" x2="1140" y2="630"/>
  </g>

  <!-- 太极图 -->
  <g transform="translate(200,315)">
    <circle cx="0" cy="0" r="95" fill="none" stroke="#d4af37" stroke-width="1.5" opacity="0.5"/>
    <path d="M0 -95 A95 95 0 0 1 0 95 A47.5 47.5 0 0 1 0 0 A47.5 47.5 0 0 0 0 -95" fill="#d4af37"/>
    <circle cx="0" cy="-47.5" r="15" fill="#0f0e17"/>
    <circle cx="0" cy="47.5" r="15" fill="#d4af37"/>
  </g>

  <!-- 标题 -->
  <text x="600" y="280" text-anchor="middle" font-family="'PingFang SC','Noto Serif SC','Microsoft YaHei',serif" font-size="64" font-weight="300" fill="#d4af37" letter-spacing="8" filter="url(#glow)">执古之道 · 御今之有</text>

  <!-- 副标题 -->
  <text x="600" y="350" text-anchor="middle" font-family="'PingFang SC','Noto Serif SC','Microsoft YaHei',serif" font-size="26" font-style="italic" fill="#c49a6c" letter-spacing="3">SAI 超级自适应智能</text>

  <!-- 标语 -->
  <text x="600" y="420" text-anchor="middle" font-family="'PingFang SC','Noto Serif SC','Microsoft YaHei',serif" font-size="18" fill="#8e959d" letter-spacing="4">先天为骨 · 后天为脉 · 无咎为心 · 寂然为觉</text>

  <!-- 底部 -->
  <text x="600" y="520" text-anchor="middle" font-family="'PingFang SC','Noto Serif SC','Microsoft YaHei',serif" font-size="13" fill="#6c757d" letter-spacing="3">从《连山》《归藏》《周易》到 JEPA · 世界模型 · 元认知</text>

  <!-- 装饰点 -->
  <circle cx="600" cy="580" r="2" fill="#d4af37" opacity="0.5"/>
</svg>
